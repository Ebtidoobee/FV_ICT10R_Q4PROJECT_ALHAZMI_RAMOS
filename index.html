<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 - Ruby 💎</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        :root {
            --ruby-light: #FFEBEE;
            --ruby-red: #D32F2F;
            --ruby-dark: #880E4F;
            --ruby-accent: #C2185B;
            --deep-maroon: #4A0404;
            --ruby-gold: #FFD700;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FFF5F5;
            color: var(--deep-maroon);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            background-color: var(--ruby-red);
            display: flex;
            justify-content: space-between;  
            align-items: center;
            padding: 12px 0;
            border-bottom: 4px solid var(--ruby-gold);
            box-shadow: 0 4px 12px rgba(136, 14, 79, 0.3);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            padding-left: 30px;
            cursor: pointer;
        }

        .nav-brand img {
            height: 50px; 
            width: auto;
            margin-right: 12px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }

        .nav-brand span {
            font-size: 1.6rem;
            font-weight: 900;
            color: white;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px var(--deep-maroon);
        }

        .nav-links {
            padding-right: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            margin: 0 15px;
            padding: 10px 18px;
            border-radius: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .nav-links a:hover {
            background-color: var(--ruby-dark);
            border-color: var(--ruby-gold);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .container {
            width: 90%;
            max-width: 900px;
            background-color: white;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(136, 14, 79, 0.2);
            border: 3px solid var(--ruby-red);
            text-align: center;
            margin-top: 50px;
            position: relative;
            overflow: hidden;
        }

  
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(211, 47, 47, 0.05), transparent);
            transform: rotate(45deg);
            animation: shimmer 8s infinite linear;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--ruby-red);
            font-weight: 900;
        }

        .class-list-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .student-card {
            background-color: var(--ruby-light);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--ruby-accent);
            font-weight: bold;
            color: var(--ruby-dark);
            box-shadow: 5px 5px 0px var(--ruby-red);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .student-card:hover {
            transform: scale(1.05) translateY(-5px);
            background-color: white;
            box-shadow: 8px 8px 0px var(--ruby-gold);
            cursor: pointer;
        }

        .hidden { display: none !important; }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--ruby-gold), transparent);
            width: 60%;
            margin: 25px auto;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-brand" py-click="show_home">
            <img src="OBMC Logo.png" alt="OBMC Logo">
            <span>OBMC</span>
        </div>
        <div class="nav-links">
            <a href="index2.html">💎 Classmates</a>
            <a href="index3.html">📅 Attendance</a>
            <a href="index4.html">📸 Activities</a>
        </div>
    </nav>

    <div class="container">
    
        <div id="welcome-view">
            <h1>10 - Ruby</h1>
            <p style="color: var(--ruby-accent); font-size: 1.2rem; font-weight: bold; letter-spacing: 1px;">
                Excellence as Rare as Rubies
            </p>
            <div style="margin: 40px 0;">
                <img src="https://www.moissaniteco.com/cache/media/products-media-large/rubyroundloosestone_92622.jpg" alt="Sparkling Ruby" style="filter: drop-shadow(0 10px 15px rgba(211, 47, 47, 0.4));">
            </div>
            <p style="font-size: 1.1rem;">Click on <b>Classmates</b> to see our precious section list.</p>
        </div>

  
        <div id="classmates-view" class="hidden">
            <h1>Our Gems 💎</h1>
            <hr>
            <div id="class-list" class="class-list-container">
              
            </div>
        </div>
    </div>

    <script type="py" src="main.py" config='{"interpreter_terminate_on_error": false}'></script>

</body>
</html>
